name: Padel Court Poller

on:
  schedule:
    - cron: "2,32 * * * *"   # opening: alle 30 min (Gate im Code prüft Öffnungsfenster)
    - cron: "15 1 * * *"     # horizon: 1×/Tag um 01:15 UTC
  workflow_dispatch:
    inputs:
      poll_type:
        description: "Poll type: opening or horizon"
        required: false
        default: "opening"

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Poll-Typ bestimmen
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TYPE=${{ github.event.inputs.poll_type }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "15 1 * * *" ]; then
            echo "TYPE=horizon" >> $GITHUB_ENV
          else
            echo "TYPE=opening" >> $GITHUB_ENV
          fi

      - name: Poll ausführen
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx tsx src/poll.ts --type ${{ env.TYPE }}
